<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Motor — Visuell redigering</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- GrapesJS -->
  <link href="https://unpkg.com/grapesjs@0.21.13/dist/css/grapes.min.css" rel="stylesheet">
  <script src="https://unpkg.com/grapesjs@0.21.13/dist/grapes.min.js"></script>
  <script src="https://unpkg.com/grapesjs-preset-webpage@1.0.3/dist/index.js"></script>
  <style>
    /* ── Reset ── */
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#111113;color:#e4e4e7;height:100vh;overflow:hidden}

    /* ── Login ── */
    #login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#111113}
    #login h1{font-size:1.4rem;font-weight:700;margin-bottom:.25rem;color:#fff}
    #login p{color:#71717a;font-size:.85rem;margin-bottom:2rem}
    #login button{background:#4ade80;color:#09090b;border:none;padding:12px 32px;font-size:.9rem;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;transition:background .15s}
    #login button:hover{background:#22c55e}

    /* ── Editor wrapper ── */
    #editor-wrap{display:none;height:100vh;flex-direction:column}

    /* ── Top bar ── */
    .topbar{height:46px;background:#18181b;border-bottom:1px solid #27272a;display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;z-index:10}
    .topbar .left{display:flex;align-items:center;gap:10px}
    .topbar .brand{font-weight:700;font-size:.85rem;color:#fff}
    .topbar .sep{color:#3f3f46}
    .topbar .mode{color:#71717a;font-size:.8rem}
    .topbar .right{display:flex;align-items:center;gap:6px}
    .topbar button,.topbar a{font-size:.78rem;font-weight:500;font-family:inherit;padding:6px 12px;border-radius:6px;cursor:pointer;border:1px solid #27272a;background:#18181b;color:#a1a1aa;text-decoration:none;transition:all .15s}
    .topbar button:hover,.topbar a:hover{background:#27272a;color:#e4e4e7}
    .topbar .save-btn{background:#4ade80;color:#09090b;border-color:#4ade80;font-weight:600}
    .topbar .save-btn:hover{background:#22c55e;border-color:#22c55e}

    /* ── GrapesJS canvas ── */
    #gjs{flex:1;overflow:hidden}

    /* ── Dark theme base ── */
    .gjs-one-bg{background:#18181b !important}
    .gjs-two-color{color:#e4e4e7 !important}
    .gjs-three-bg{background:#27272a !important}
    .gjs-four-color,.gjs-four-color-h:hover{color:#4ade80 !important}
    .gjs-cv-canvas{background:#1a1a1e !important}

    /* ── GrapesJS panels base ── */
    .gjs-pn-panel{border:none !important;background:#18181b !important}

    /* Hide the default right sidebar GrapesJS creates */
    .gjs-pn-views-container{display:none !important}
    .gjs-pn-views{display:none !important}

    /* Keep the canvas toolbar */
    .gjs-pn-commands,
    .gjs-pn-options,
    .gjs-pn-devices-c{
      background:#18181b !important;
      border:none !important;
    }

    /* Panel buttons (canvas toolbar icons) */
    .gjs-pn-btn{border-radius:6px !important;padding:6px !important;margin:2px !important;color:#71717a !important;transition:all .15s !important}
    .gjs-pn-btn:hover{color:#e4e4e7 !important;background:rgba(255,255,255,.06) !important}
    .gjs-pn-btn.gjs-pn-active{background:#4ade80 !important;color:#09090b !important}

    /* ── Green selection outlines ── */
    .gjs-selected{outline:2px solid #4ade80 !important;outline-offset:2px}
    .gjs-hovered{outline:1px dashed #4ade80 !important}

    /* ── Element toolbar ── */
    .gjs-toolbar{background:#18181b;border:1px solid #27272a;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
    .gjs-toolbar-item{color:#a1a1aa}
    .gjs-toolbar-item:hover{color:#4ade80}

    /* ── Badge/label ── */
    .gjs-badge{background:#4ade80;color:#09090b;font-weight:600;border-radius:4px;padding:2px 8px;font-size:11px}

    /* ── Blocks (draggable elements) ── */
    .gjs-blocks-cs{padding:8px !important;display:grid !important;grid-template-columns:1fr 1fr !important;gap:6px !important}
    .gjs-block{background:#18181b !important;border:1px solid #27272a !important;border-radius:8px !important;color:#a1a1aa !important;padding:10px 8px !important;min-height:auto !important;font-size:.75rem !important;transition:all .15s !important;display:flex !important;flex-direction:column !important;align-items:center !important;gap:6px !important;width:auto !important}
    .gjs-block:hover{border-color:#4ade80 !important;color:#e4e4e7 !important;background:#1c2a1f !important}
    .gjs-block__media{display:flex !important;align-items:center;justify-content:center;width:28px !important;height:28px !important;flex-shrink:0}
    .gjs-block__media svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
    .gjs-block-label{font-size:.72rem !important;line-height:1.2 !important}
    .gjs-block-category .gjs-title{background:#111113 !important;color:#71717a !important;font-size:.7rem !important;text-transform:uppercase !important;letter-spacing:.06em !important;padding:10px 12px !important;border-bottom:1px solid #27272a !important}

    /* ── Layers (left panel) ── */
    .gjs-layers{background:#18181b !important}
    .gjs-layer{border-bottom:1px solid rgba(255,255,255,.03) !important;transition:background .1s !important;position:relative}
    .gjs-layer:hover{background:rgba(74,222,128,.03) !important}
    .gjs-layer-name{font-size:.78rem !important;padding:6px 4px !important;color:#a1a1aa !important}
    .gjs-layer.gjs-selected{background:rgba(74,222,128,.08) !important;border-left:3px solid #4ade80 !important}
    .gjs-layer.gjs-selected .gjs-layer-name{color:#e4e4e7 !important}
    .gjs-layer-title{padding:4px 8px !important}
    .gjs-layer-caret{color:#52525b !important}
    /* Indent lines for hierarchy */
    .gjs-layer-children{border-left:1px solid #27272a !important;margin-left:12px !important}

    /* ── Style Manager (right panel sectors) ── */
    .gjs-sm-sector{border-bottom:1px solid #27272a !important}
    .gjs-sm-sector-title{background:#111113 !important;color:#71717a !important;font-size:.7rem !important;text-transform:uppercase !important;letter-spacing:.06em !important;padding:10px 14px !important;font-weight:600 !important;cursor:pointer !important;transition:color .15s !important}
    .gjs-sm-sector.gjs-sm-open .gjs-sm-sector-title{color:#e4e4e7 !important}
    .gjs-sm-properties{padding:10px 14px !important}
    .gjs-sm-label{color:#71717a !important;font-size:.7rem !important;font-weight:500 !important}
    .gjs-field{background:#09090b !important;border:1px solid #27272a !important;border-radius:6px !important;color:#e4e4e7 !important;font-size:.82rem !important;transition:border-color .15s, box-shadow .15s !important}
    .gjs-field:focus-within{border-color:#4ade80 !important;box-shadow:0 0 0 2px rgba(74,222,128,.15) !important}
    .gjs-field-arrows{display:flex !important}
    .gjs-input-holder input{padding:8px 12px !important;font-size:.85rem !important}
    .gjs-field select{padding:8px 12px !important;background:#09090b !important;color:#e4e4e7 !important;font-size:.85rem !important}
    .gjs-field-color-picker{border-radius:4px !important}

    /* ── Selector / Class manager ── */
    .gjs-clm-tags{padding:8px 12px !important;background:#18181b !important}
    .gjs-clm-tag{background:#1a3a24 !important;border-radius:4px !important;color:#4ade80 !important;border:1px solid rgba(74,222,128,.2) !important}
    .gjs-clm-sels-info{font-size:.7rem !important;color:#52525b !important}

    /* ── Traits (component settings) ── */
    .gjs-trt-traits{padding:4px 0 !important}
    .gjs-trt-trait{padding:10px 16px !important;border-bottom:1px solid rgba(255,255,255,.04) !important;display:flex !important;flex-direction:column !important;gap:6px !important}
    .gjs-trt-trait:last-child{border-bottom:none !important}
    .gjs-trt-trait .gjs-label{font-size:.7rem !important;font-weight:600 !important;color:#71717a !important;text-transform:uppercase !important;letter-spacing:.04em !important;width:100% !important;white-space:normal !important;overflow:visible !important;text-overflow:unset !important;min-width:0 !important;flex:none !important}
    .gjs-trt-trait .gjs-field{min-height:36px !important;width:100% !important}
    .gjs-trt-trait textarea.gjs-field{min-height:120px !important;resize:vertical !important;line-height:1.6 !important;padding:10px 12px !important;font-size:.85rem !important}
    .gjs-trt-trait input.gjs-field,
    .gjs-trt-trait .gjs-field input{padding:8px 12px !important;font-size:.85rem !important}

    /* ── Element info header ── */
    #element-info{
      background:#111113;padding:12px 16px;border-bottom:1px solid #27272a;
      display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:44px;flex-wrap:wrap;
    }
    #element-info .el-icon{width:20px;height:20px;color:#4ade80;flex-shrink:0}
    #element-info .el-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    #element-info .el-tag{font-weight:700;font-size:.75rem;color:#e4e4e7;text-transform:uppercase;letter-spacing:.03em}
    #element-info .el-classes{display:flex;gap:4px;flex-wrap:wrap}
    #element-info .el-class-pill{font-size:.65rem;color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:4px;padding:1px 6px;font-weight:500}
    #element-info .el-empty{font-size:.75rem;color:#52525b;font-style:italic}

    /* ── Tab buttons (shared) ── */
    .panel-tabs{display:flex;border-bottom:1px solid #27272a;flex-shrink:0;background:#111113}
    .tab-btn{
      flex:1;padding:10px 0;font-size:.72rem;font-weight:600;
      text-transform:uppercase;letter-spacing:.05em;
      background:none;border:none;color:#52525b;cursor:pointer;
      border-bottom:2px solid transparent;font-family:inherit;
      transition:color .15s, border-color .15s;
    }
    .tab-btn:hover{color:#a1a1aa}
    .tab-btn.active{color:#4ade80;border-bottom-color:#4ade80}

    /* ── Scrollbars (all panels) ── */
    #left-panel ::-webkit-scrollbar,
    #right-panel ::-webkit-scrollbar{width:5px}
    #left-panel ::-webkit-scrollbar-track,
    #right-panel ::-webkit-scrollbar-track{background:#18181b}
    #left-panel ::-webkit-scrollbar-thumb,
    #right-panel ::-webkit-scrollbar-thumb{background:#27272a;border-radius:3px}
    #left-panel ::-webkit-scrollbar-thumb:hover,
    #right-panel ::-webkit-scrollbar-thumb:hover{background:#3f3f46}

    /* ── Rich text editor toolbar ── */
    .gjs-rte-toolbar{background:#18181b !important;border:1px solid #27272a !important;border-radius:6px !important;box-shadow:0 4px 12px rgba(0,0,0,.4) !important}
    .gjs-rte-actionbar{padding:4px !important}
    .gjs-rte-action{color:#a1a1aa !important;border-radius:4px !important}
    .gjs-rte-action:hover{color:#e4e4e7 !important;background:rgba(255,255,255,.08) !important}
    .gjs-rte-active{color:#4ade80 !important}

    /* ── Composite/radio fields polish ── */
    .gjs-sm-composite{padding:6px 0 !important}
    .gjs-radio-item{border-radius:4px !important;transition:background .1s !important}
    .gjs-radio-item:hover{background:rgba(255,255,255,.04) !important}
    .gjs-radio-item input:checked + .gjs-radio-item-label{background:#4ade80 !important;color:#09090b !important;border-radius:4px !important;font-weight:600 !important}

    /* ── Toast ── */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);opacity:0;padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:500;color:#fff;z-index:9999;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast.success{background:#059669}
    .toast.error{background:#dc2626}

    /* ── Empty state for traits panel ── */
    .traits-empty{padding:24px 16px;text-align:center;color:#52525b;font-size:.8rem;line-height:1.5}

    /* ── Section headers in left panel ── */
    .panel-section-header{padding:10px 14px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#52525b;border-bottom:1px solid #27272a;background:#111113}
  </style>
</head>
<body>

<div id="login">
  <h1>HM Motor</h1>
  <p>Visuell redigering</p>
  <button onclick="netlifyIdentity.open('login')">Logga in</button>
</div>

<div id="editor-wrap">
  <div class="topbar">
    <div class="left">
      <span class="brand">HM Motor</span>
      <span class="sep">/</span>
      <span class="mode">Visuell redigering</span>
    </div>
    <div class="right">
      <a href="/dashboard">Fordon</a>
      <a href="/" target="_blank">Visa sajten &#8599;</a>
      <button onclick="undoAction()">&#8630; Angra</button>
      <button onclick="redoAction()">&#8631; Gor om</button>
      <button class="save-btn" id="saveBtn" onclick="saveChanges()">Spara</button>
      <button onclick="netlifyIdentity.logout();location.reload()" style="border-color:#3f3f46">Logga ut</button>
    </div>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">

    <!-- Left panel: Layers + Blocks -->
    <div id="left-panel" style="width:240px;min-width:240px;background:#18181b;border-right:1px solid #27272a;display:flex;flex-direction:column;overflow:hidden">
      <div class="panel-tabs">
        <button class="tab-btn active" onclick="switchLeft('layers')" id="tab-layers">Lager</button>
        <button class="tab-btn" onclick="switchLeft('blocks')" id="tab-blocks">Block</button>
      </div>
      <div id="layers-panel" style="flex:1;overflow-y:auto"></div>
      <div id="blocks-panel" style="flex:1;overflow-y:auto;display:none"></div>
    </div>

    <!-- Canvas -->
    <div id="gjs" style="flex:1"></div>

    <!-- Right panel: Element info + Tabs (Egenskaper / Stilar) -->
    <div id="right-panel" style="width:320px;min-width:320px;background:#18181b;border-left:1px solid #27272a;display:flex;flex-direction:column;overflow:hidden">
      <div id="element-info">
        <span class="el-empty">Klicka pa ett element</span>
      </div>
      <div class="panel-tabs">
        <button class="tab-btn" onclick="switchRight('styles')" id="tab-styles">Stilar</button>
        <button class="tab-btn active" onclick="switchRight('traits')" id="tab-traits">Egenskaper</button>
      </div>
      <div id="traits-panel" style="flex:1;overflow-y:auto">
        <div class="traits-empty">Markera ett element for att redigera egenskaper</div>
      </div>
      <div id="styles-panel" style="flex:1;overflow-y:auto;display:none"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let editor, token, pageSha;

/* ================================================================
   AUTH
   ================================================================ */
function initAuth() {
  const u = netlifyIdentity.currentUser();
  if (u) startApp(u);
  else {
    document.getElementById('login').style.display = 'flex';
    netlifyIdentity.on('login', u => startApp(u));
  }
}

async function startApp(user) {
  token = await user.jwt();
  document.getElementById('login').style.display = 'none';
  document.getElementById('editor-wrap').style.display = 'flex';
  await loadPageAndInit();
}

/* ================================================================
   LOAD PAGE HTML FROM GITHUB
   ================================================================ */
async function loadPageAndInit() {
  try {
    const r = await fetch('/.netlify/git/github/contents/index.html', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const j = await r.json();
    pageSha = j.sha;
    const html = decodeURIComponent(escape(atob(j.content)));
    initEditor(html);
  } catch (e) {
    // Fallback: fetch the live page
    const r = await fetch('/');
    const html = await r.text();
    initEditor(html);
  }
}

/* ================================================================
   BLOCK SVG ICONS
   ================================================================ */
const BLOCK_ICONS = {
  section: '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>',
  cta: '<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="5"/><line x1="8" y1="12" x2="16" y2="12"/></svg>',
  card: '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="14" x2="17" y2="14"/><line x1="7" y1="17" x2="13" y2="17"/></svg>',
  faq: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 0 1 4.87.5c0 1.5-2.37 2-2.37 3"/><circle cx="12" cy="16.5" r=".5" fill="currentColor"/></svg>',
  trust: '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
};

/* ── Layer icons by element type ── */
const LAYER_ICONS = {
  section: '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" fill="none" stroke-width="1.5"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5"/></svg>',
  div: '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>',
  h: '<svg viewBox="0 0 24 24" width="14" height="14"><text x="5" y="18" font-size="16" font-weight="700" fill="currentColor" font-family="Inter,sans-serif">H</text></svg>',
  p: '<svg viewBox="0 0 24 24" width="14" height="14"><line x1="4" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="1.5"/><line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="4" y1="17" x2="14" y2="17" stroke="currentColor" stroke-width="1.5"/></svg>',
  a: '<svg viewBox="0 0 24 24" width="14" height="14"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"/></svg>',
  img: '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" fill="none" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>',
  nav: '<svg viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="9" stroke="currentColor" fill="none" stroke-width="1.5"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>',
  header: '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="18" height="7" rx="1" stroke="currentColor" fill="none" stroke-width="1.5"/><rect x="3" y="14" width="18" height="7" rx="1" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>',
  details: '<svg viewBox="0 0 24 24" width="14" height="14"><line x1="8" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="1.5"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>',
  footer: '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" fill="none" stroke-width="1.5"/><line x1="3" y1="15" x2="21" y2="15" stroke="currentColor" stroke-width="1.5"/></svg>',
  span: '<svg viewBox="0 0 24 24" width="14" height="14"><text x="6" y="17" font-size="13" fill="currentColor" font-family="Inter,sans-serif">Aa</text></svg>',
  button: '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="7" width="18" height="10" rx="5" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>',
  form: '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" fill="none" stroke-width="1.5"/><line x1="7" y1="8" x2="17" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="7" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="7" y1="16" x2="12" y2="16" stroke="currentColor" stroke-width="1.5"/></svg>',
  ul: '<svg viewBox="0 0 24 24" width="14" height="14"><line x1="9" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="1.5"/><circle cx="5" cy="6" r="1.5" fill="currentColor"/><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="5" cy="18" r="1.5" fill="currentColor"/></svg>',

  svg: '<svg viewBox="0 0 24 24" width="14" height="14"><polygon points="12,2 22,22 2,22" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>',

};

function getLayerIcon(tag) {
  const t = tag.toLowerCase();
  if (t === 'section') return LAYER_ICONS.section;
  if (t === 'nav') return LAYER_ICONS.nav;
  if (t === 'header') return LAYER_ICONS.header;
  if (t === 'footer') return LAYER_ICONS.footer;
  if (t === 'div') return LAYER_ICONS.div;
  if (/^h[1-6]$/.test(t)) return LAYER_ICONS.h;
  if (t === 'p') return LAYER_ICONS.p;
  if (t === 'a') return LAYER_ICONS.a;
  if (t === 'img') return LAYER_ICONS.img;
  if (t === 'details' || t === 'summary') return LAYER_ICONS.details;
  if (t === 'span' || t === 'strong' || t === 'em' || t === 'label') return LAYER_ICONS.span;
  if (t === 'button') return LAYER_ICONS.button;
  if (t === 'form' || t === 'textarea' || t === 'select') return LAYER_ICONS.form;
  if (t === 'input') return LAYER_ICONS.input;
  if (t === 'ul' || t === 'ol' || t === 'li') return LAYER_ICONS.ul;
  if (t === 'video') return LAYER_ICONS.video;
  if (t === 'svg') return LAYER_ICONS.svg;
  return LAYER_ICONS.div;
}

/* ================================================================
   GRAPESJS INIT
   ================================================================ */
function initEditor(html) {
  // Parse the incoming HTML
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Gather external CSS links
  const cssLinks = [];
  doc.querySelectorAll('link[rel="stylesheet"]').forEach(l => {
    let href = l.getAttribute('href');
    if (href && !href.startsWith('http')) href = window.location.origin + '/' + href.replace(/^\//, '');
    if (href) cssLinks.push(href);
  });

  // Get body HTML without scripts
  const bodyClone = doc.body.cloneNode(true);
  bodyClone.querySelectorAll('script').forEach(s => s.remove());
  const bodyHTML = bodyClone.innerHTML;

  // Get inline styles
  let inlineCSS = '';
  doc.querySelectorAll('style').forEach(s => inlineCSS += s.textContent);

  editor = grapesjs.init({
    container: '#gjs',
    height: '100%',
    width: 'auto',
    fromElement: false,
    components: bodyHTML,
    style: inlineCSS,
    storageManager: false,
    canvas: {
      styles: cssLinks.concat([
        'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap'
      ]),
      scripts: [
        'https://unpkg.com/lucide@latest'
      ]
    },
    plugins: ['gjs-preset-webpage'],
    pluginsOpts: {
      'gjs-preset-webpage': {
        blocksBasicOpts: { flexGrid: true },
        navbarOpts: false,
        countdownOpts: false,
        formsOpts: false,
      }
    },
    blockManager: { appendTo: '#blocks-panel' },
    layerManager: { appendTo: '#layers-panel' },
    selectorManager: { appendTo: '#styles-panel' },
    styleManager: {
      appendTo: '#styles-panel',
      sectors: [
        { name: 'Layout', open: true, properties: [
          { extend: 'display', type: 'radio', defaults: 'block', options: [
            {value:'block',name:'Block'},{value:'flex',name:'Flex'},{value:'grid',name:'Grid'},
            {value:'inline',name:'Inline'},{value:'none',name:'Dolj'}
          ]},
          'flex-direction','flex-wrap','justify-content','align-items','align-content','gap',
          'position','top','right','bottom','left','z-index','overflow'
        ]},
        { name: 'Storlek', open: false, properties: [
          'width','min-width','max-width','height','min-height','max-height','margin','padding'
        ]},
        { name: 'Typografi', open: false, properties: [
          'font-family','font-size','font-weight','letter-spacing','color','line-height',
          'text-align','text-decoration','text-transform'
        ]},
        { name: 'Utseende', open: false, properties: [
          'background-color','background','border-radius','border','box-shadow','opacity'
        ]},
      ]
    },
    traitManager: { appendTo: '#traits-panel' },
    deviceManager: {
      devices: [
        { name: 'Desktop', width: '' },
        { name: 'Tablet', width: '768px', widthMedia: '992px' },
        { name: 'Mobil', width: '375px', widthMedia: '480px' },
      ]
    },
  });

  /* ── Custom HM Motor blocks ── */
  const bm = editor.BlockManager;

  bm.add('hm-section', {
    label: 'Sektion',
    category: 'HM Motor',
    media: BLOCK_ICONS.section,
    content: '<section class="section section--white"><div class="container"><div class="section-header"><h2>Ny sektion</h2></div><p>Innehall har...</p></div></section>',
  });

  bm.add('hm-cta', {
    label: 'CTA-knapp',
    category: 'HM Motor',
    media: BLOCK_ICONS.cta,
    content: '<a href="#" class="btn btn-blue btn-lg">Klicka har</a>',
  });

  bm.add('hm-card', {
    label: 'Nyhetskort',
    category: 'HM Motor',
    media: BLOCK_ICONS.card,
    content: '<div class="just-nu-card"><span class="just-nu-label">Nyheter</span><h3>Rubrik</h3><p>Beskrivning</p><a href="#">Las mer &rarr;</a></div>',
  });

  bm.add('hm-faq', {
    label: 'FAQ-fraga',
    category: 'HM Motor',
    media: BLOCK_ICONS.faq,
    content: '<details class="faq-item"><summary>Ny fraga<span class="faq-toggle">+</span></summary><p>Svar har...</p></details>',
  });

  bm.add('hm-trust', {
    label: 'Trust-signal',
    category: 'HM Motor',
    media: BLOCK_ICONS.trust,
    content: '<div class="hero-trust-item"><strong>99+</strong> nojda kunder</div>',
  });

  /* ── Lucide icons init after canvas loads ── */
  editor.on('canvas:frame:load', ({ window: w }) => {
    setTimeout(() => {
      if (w.lucide) w.lucide.createIcons();
    }, 500);
  });

  /* ── Semantic layer names ── */
  const SEMANTIC_NAMES = {
    'section': 'Section', 'header': 'Header Section', 'footer': 'Footer Section',
    'nav': 'Navbar', 'main': 'Main Content', 'article': 'Article', 'aside': 'Sidebar',
  };

  function setSemanticName(comp) {
    const el = comp.getEl();
    if (!el) return;
    const tag = (el.tagName || '').toLowerCase();
    if (!tag || tag === 'body') return;

    const classes = comp.getClasses();
    const firstClass = classes.length ? classes[0] : '';
    let name = '';

    // Try semantic name first
    if (SEMANTIC_NAMES[tag]) {
      name = SEMANTIC_NAMES[tag];
    } else if (/^h[1-6]$/.test(tag)) {
      // Count headings of same level for numbering
      name = tag.toUpperCase() + ' Heading';
    } else if (tag === 'p') {
      name = 'P Description';
    } else if (tag === 'a') {
      name = 'Link';
    } else if (tag === 'img') {
      name = 'Image';
    } else if (tag === 'div') {
      if (firstClass) {
        // Convert class to readable name
        name = firstClass.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      } else {
        name = 'Div Block';
      }
    } else if (tag === 'details') {
      name = 'FAQ Item';
    } else if (tag === 'summary') {
      name = 'FAQ Question';
    } else if (tag === 'button') {
      name = 'Button';
    } else if (tag === 'span') {
      name = firstClass ? firstClass.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : 'Span';
    } else if (tag === 'ul' || tag === 'ol') {
      name = 'List';
    } else if (tag === 'li') {
      name = 'List Item';
    } else if (tag === 'strong' || tag === 'em') {
      name = tag === 'strong' ? 'Bold' : 'Italic';
    } else {
      name = tag.toUpperCase();
    }

    // For text elements, append a snippet
    const TEXT_ELEMENTS = ['h1','h2','h3','h4','h5','h6','p','a','button','label','li','summary'];
    if (TEXT_ELEMENTS.includes(tag)) {
      const text = (el.textContent || '').trim();
      if (text.length > 0 && text.length < 30) {
        name += ': "' + text.substring(0, 20) + (text.length > 20 ? '...' : '') + '"';
      }
    }

    comp.set('custom-name', name);
  }

  // Apply semantic names after init
  editor.on('load', () => {
    const wrapper = editor.DomComponents.getWrapper();
    if (wrapper) {
      wrapper.onAll(comp => setSemanticName(comp));
    }
  });

  // Apply to newly added components
  editor.on('component:add', (comp) => {
    setTimeout(() => setSemanticName(comp), 50);
  });

  /* ── Element info header with icon + class pills ── */
  function updateElementInfo(model) {
    const infoEl = document.getElementById('element-info');
    if (!model) {
      infoEl.innerHTML = '<span class="el-empty">Klicka pa ett element</span>';
      return;
    }
    const el = model.getEl();
    if (!el) return;

    const tag = el.tagName.toLowerCase();
    const classes = model.getClasses();
    const icon = getLayerIcon(tag);

    let html = '<span class="el-icon">' + icon + '</span>';
    html += '<span class="el-tag">' + tag + '</span>';

    if (classes.length) {
      html += '<span class="el-classes">';
      classes.forEach(c => {
        html += '<span class="el-class-pill">.' + c + '</span>';
      });
      html += '</span>';
    }

    infoEl.innerHTML = html;
  }

  editor.on('component:selected', updateElementInfo);
  editor.on('component:deselected', () => updateElementInfo(null));

  /* ── Text tags that show content editor ── */
  const TEXT_TAGS = ['H1','H2','H3','H4','H5','H6','P','SPAN','A','SUMMARY','STRONG','LABEL','LI','TD','TH','BUTTON','FIGCAPTION'];

  /* ── Single click to inline-edit text ── */
  editor.on('component:selected', (model) => {
    const el = model.getEl();
    if (!el) return;
    const tag = el.tagName;

    if (TEXT_TAGS.includes(tag)) {
      model.set('editable', true);
      // Trigger inline editing immediately
      setTimeout(() => {
        const elInCanvas = model.getEl();
        if (elInCanvas) {
          model.trigger('active');
        }
      }, 100);
    }
  });

  /* ── When selecting a component, configure traits ── */
  editor.on('component:selected', (model) => {
    const el = model.getEl();
    if (!el) return;
    const tag = el.tagName;

    // Build trait list
    const traits = [];
    if (TEXT_TAGS.includes(tag)) {
      traits.push({
        type: 'textarea',
        label: 'Textinnehall',
        name: 'content-text',
        changeProp: true,
        placeholder: 'Skriv text...',
      });
    }

    // Link traits
    if (tag === 'A') {
      traits.push({ type: 'text', label: 'Lank (URL)', name: 'href', placeholder: 'https://...' });
      traits.push({ type: 'select', label: 'Oppna i', name: 'target', options: [{value:'', name:'Samma flik'},{value:'_blank', name:'Ny flik'}] });
    }

    // Image traits
    if (tag === 'IMG') {
      traits.push({ type: 'text', label: 'Bild-URL', name: 'src', placeholder: 'https://...' });
      traits.push({ type: 'text', label: 'Alt-text', name: 'alt', placeholder: 'Beskrivning...' });
    }

    if (traits.length) {
      model.set('traits', traits);

      // Set initial value for content-text
      if (TEXT_TAGS.includes(tag)) {
        const directText = Array.from(el.childNodes)
          .filter(n => n.nodeType === 3)
          .map(n => n.textContent.trim())
          .join(' ') || el.textContent.trim();
        model.set('content-text', directText);
      }

      // Auto-switch to Egenskaper tab
      switchRight('traits');
    } else {
      // No traits — show empty state or switch to styles
      model.set('traits', []);
    }
  });

  /* ── When content-text changes, update component ── */
  editor.on('component:update:content-text', (model) => {
    const newText = model.get('content-text');
    if (newText !== undefined) {
      const el = model.getEl();
      if (el) {
        const hasChildren = el.querySelector('*');
        if (hasChildren) {
          const textNode = Array.from(el.childNodes).find(n => n.nodeType === 3);
          if (textNode) textNode.textContent = newText;
        } else {
          model.components(newText);
        }
      }
    }
  });
}

/* ================================================================
   TAB SWITCHING
   ================================================================ */
function switchLeft(tab) {
  const layersPanel = document.getElementById('layers-panel');
  const blocksPanel = document.getElementById('blocks-panel');
  const tabLayers = document.getElementById('tab-layers');
  const tabBlocks = document.getElementById('tab-blocks');

  layersPanel.style.display = tab === 'layers' ? 'block' : 'none';
  blocksPanel.style.display = tab === 'blocks' ? 'block' : 'none';

  tabLayers.classList.toggle('active', tab === 'layers');
  tabBlocks.classList.toggle('active', tab === 'blocks');
}

function switchRight(tab) {
  const traitsPanel = document.getElementById('traits-panel');
  const stylesPanel = document.getElementById('styles-panel');
  const tabTraits = document.getElementById('tab-traits');
  const tabStyles = document.getElementById('tab-styles');

  traitsPanel.style.display = tab === 'traits' ? 'block' : 'none';
  stylesPanel.style.display = tab === 'styles' ? 'block' : 'none';

  tabTraits.classList.toggle('active', tab === 'traits');
  tabStyles.classList.toggle('active', tab === 'styles');
}

/* ================================================================
   ACTIONS
   ================================================================ */
function undoAction() { if (editor) editor.UndoManager.undo(); }
function redoAction() { if (editor) editor.UndoManager.redo(); }

async function saveChanges() {
  if (!editor) return;
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Sparar...';
  btn.disabled = true;

  try {
    const html = editor.getHtml();
    const css = editor.getCss();
    const fullHTML = buildFullPage(html, css);
    const encoded = btoa(unescape(encodeURIComponent(fullHTML)));

    // Get fresh SHA
    const shaResp = await fetch('/.netlify/git/github/contents/index.html', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const shaData = await shaResp.json();
    pageSha = shaData.sha;

    const r = await fetch('/.netlify/git/github/contents/index.html', {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Visuell redigering via admin',
        content: encoded,
        sha: pageSha
      })
    });

    if (!r.ok) throw new Error('Kunde inte spara');
    const result = await r.json();
    pageSha = result.content.sha;
    toast('Sparat! Sajten uppdateras om ~30 sek.', 'success');
  } catch (e) {
    toast('Fel: ' + e.message, 'error');
  }

  btn.textContent = 'Spara';
  btn.disabled = false;
}
