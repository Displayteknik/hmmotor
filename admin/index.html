<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Motor — Redigera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2563eb;--blue-hover:#1d4ed8;--blue-ring:rgba(37,99,235,.12);--green:#059669;--red:#dc2626;--border:#e5e7eb;--text:#111827;--text-sec:#6b7280;--text-dim:#9ca3af;--bg:#f3f4f6;--white:#fff;--radius:8px}
    body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

    /* Login */
    #login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#fff}
    #login h1{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
    #login p{color:var(--text-sec);font-size:.9rem;margin-bottom:2rem}
    #login button{background:var(--blue);color:#fff;border:none;padding:12px 32px;font-size:.9rem;font-weight:600;border-radius:var(--radius);cursor:pointer;font-family:inherit}
    #login button:hover{background:var(--blue-hover)}

    /* Layout */
    #app{display:none;height:100vh;flex-direction:column}
    .toolbar{height:48px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
    .toolbar .left{display:flex;align-items:center;gap:12px}
    .toolbar .brand{font-weight:700;font-size:.9rem}
    .toolbar .sep{color:#ddd}
    .toolbar .mode{font-size:.8rem;color:var(--text-sec);font-weight:500}
    .toolbar .right{display:flex;align-items:center;gap:8px}
    .toolbar a,.toolbar button{font-size:.8rem;font-weight:500;font-family:inherit;text-decoration:none;padding:6px 12px;border-radius:6px;cursor:pointer;border:none;transition:all .15s}
    .toolbar a{color:var(--text-sec);background:none}
    .toolbar a:hover{color:var(--text);background:var(--bg)}
    .toolbar .save-btn{background:var(--blue);color:#fff}
    .toolbar .save-btn:hover{background:var(--blue-hover)}
    .toolbar .save-btn:disabled{opacity:.4;cursor:default}
    .toolbar .logout{color:var(--text-dim);background:none}

    /* Split view */
    .split{display:flex;flex:1;overflow:hidden}
    .preview-pane{flex:1;position:relative;background:#e5e5e5}
    .preview-pane iframe{width:100%;height:100%;border:none}

    /* Sidebar */
    .sidebar{width:380px;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease;flex-shrink:0}
    .sidebar.closed{transform:translateX(380px);margin-left:-380px}
    .sidebar-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .sidebar-head h3{font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .sidebar-head h3 .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .sidebar-head button{background:none;border:none;font-size:1.2rem;color:var(--text-dim);cursor:pointer;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center}
    .sidebar-head button:hover{background:var(--bg);color:var(--text)}
    .sidebar-body{flex:1;overflow-y:auto;padding:16px 20px 80px}

    /* Sidebar fields */
    .s-field{margin-bottom:14px}
    .s-field label{display:block;font-size:.7rem;font-weight:600;color:var(--text-sec);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
    .s-field input,.s-field textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:.85rem;font-family:inherit;color:var(--text);transition:border .15s,box-shadow .15s;resize:vertical;background:#fff}
    .s-field input:focus,.s-field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-ring)}
    .s-field textarea{min-height:64px;line-height:1.5}
    .s-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* List in sidebar */
    .s-list-item{border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;position:relative}
    .s-list-item:hover{border-color:#d1d5db}
    .s-list-item .s-remove{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-dim);font-size:1rem;cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px}
    .s-list-item .s-remove:hover{color:var(--red);background:#fef2f2}
    .s-list-item .s-field{margin-bottom:8px}
    .s-list-item .s-field:last-child{margin-bottom:0}
    .s-add{display:flex;align-items:center;justify-content:center;gap:4px;width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:var(--radius);background:none;color:var(--blue);font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
    .s-add:hover{background:#eff6ff;border-color:var(--blue)}

    /* Section picker (when no section selected) */
    .section-list{padding:8px 0}
    .section-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-radius:var(--radius);transition:background .1s;margin-bottom:2px}
    .section-item:hover{background:var(--bg)}
    .section-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .section-item .info{flex:1}
    .section-item .info h4{font-size:.85rem;font-weight:600}
    .section-item .info span{font-size:.75rem;color:var(--text-dim)}
    .section-item .arrow{color:var(--text-dim);font-size:.7rem}

    /* Overlay highlights */
    .edit-overlay{position:absolute;pointer-events:none;border:2px solid var(--blue);border-radius:6px;background:rgba(37,99,235,.06);z-index:10;transition:all .2s ease}
    .edit-overlay .edit-label{position:absolute;top:-28px;left:-2px;background:var(--blue);color:#fff;font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:4px 4px 0 0;white-space:nowrap;pointer-events:auto;cursor:pointer}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);opacity:0;padding:10px 20px;border-radius:var(--radius);font-size:.85rem;font-weight:500;color:#fff;z-index:999;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast.success{background:var(--green)}.toast.error{background:var(--red)}

    /* Loading */
    .loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:.9rem;gap:10px}
    .spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="login">
  <h1>HM Motor</h1>
  <p>Logga in för att redigera sajten</p>
  <button onclick="netlifyIdentity.open('login')">Logga in</button>
</div>

<div id="app">
  <div class="toolbar">
    <div class="left">
      <span class="brand">HM Motor</span>
      <span class="sep">/</span>
      <span class="mode">Visuell redigering</span>
    </div>
    <div class="right">
      <a href="/dashboard">Fordonshantering</a>
      <button class="save-btn" id="globalSave" onclick="saveAll()" disabled>Spara</button>
      <button class="logout" id="logoutBtn">Logga ut</button>
    </div>
  </div>
  <div class="split">
    <div class="preview-pane" id="previewPane">
      <div class="loading"><div class="spinner"></div>Laddar sajten...</div>
    </div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h3 id="sidebarTitle">Välj sektion</h3>
        <button onclick="closeSidebar()" title="Stäng">×</button>
      </div>
      <div class="sidebar-body" id="sidebarBody">
        <div class="section-list" id="sectionList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SECTIONS = [
  { id:'hero', label:'Startsida — Hero', color:'#2563eb', anchor:'hero' },
  { id:'faq', label:'Vanliga frågor', color:'#8b5cf6', anchor:'faq' },
  { id:'about', label:'Om oss', color:'#059669', anchor:null },
  { id:'just-nu', label:'Just nu — Nyheter', color:'#f59e0b', anchor:'just-nu' },
  { id:'services', label:'Varför HM Motor', color:'#ec4899', anchor:'services' }
];

let data={}, shas={}, token='', dirty=new Set(), activeSection=null;

/* ── Auth ── */
function initAuth(){
  const u=netlifyIdentity.currentUser();
  if(u){startApp(u);return}
  document.getElementById('login').style.display='flex';
  netlifyIdentity.on('login',u=>startApp(u));
}

async function startApp(user){
  token=await user.jwt();
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('logoutBtn').onclick=()=>{netlifyIdentity.logout();location.reload()};
  await loadAll();
}

/* ── API ── */
async function loadFile(name){
  const r=await fetch(`/.netlify/git/github/contents/content/pages/${name}.json`,{headers:{Authorization:'Bearer '+token}});
  if(!r.ok)throw new Error('Load failed: '+name);
  const j=await r.json();
  shas[name]=j.sha;
  data[name]=JSON.parse(atob(j.content));
}

async function saveFile(name){
  const body=JSON.stringify(data[name],null,2)+'\n';
  const r=await fetch(`/.netlify/git/github/contents/content/pages/${name}.json`,{
    method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({message:`Uppdatera ${name}`,content:btoa(unescape(encodeURIComponent(body))),sha:shas[name]})
  });
  if(!r.ok)throw new Error('Save failed');
  const j=await r.json();
  shas[name]=j.content.sha;
}

/* ── Load ── */
async function loadAll(){
  try{
    await Promise.all(SECTIONS.map(s=>loadFile(s.id)));
    initPreview();
    renderSectionList();
  }catch(e){
    document.getElementById('previewPane').innerHTML=`<div class="loading" style="color:var(--red)">Fel: ${e.message}</div>`;
  }
}

/* ── Preview iframe ── */
function initPreview(){
  const pane=document.getElementById('previewPane');
  pane.innerHTML='<iframe id="previewFrame" src="/"></iframe>';
  const frame=document.getElementById('previewFrame');
  frame.onload=()=>{
    try{
      const doc=frame.contentDocument;
      // Add click handlers to editable sections
      addEditableOverlays(doc);
    }catch(e){console.warn('iframe access blocked',e)}
  };
}

function addEditableOverlays(doc){
  // Mark sections clickable
  const map={
    hero:doc.querySelector('.hero, [class*="hero"], section:first-of-type'),
    faq:doc.getElementById('faq')||doc.querySelector('[class*="faq"]'),
    'just-nu':doc.getElementById('just-nu')||doc.querySelector('[class*="just-nu"]'),
    services:doc.getElementById('services')||doc.querySelector('.services, [class*="varfor"]'),
  };

  // Add edit-mode styles to iframe
  const style=doc.createElement('style');
  style.textContent=`
    [data-editable]{cursor:pointer;position:relative;transition:outline .15s}
    [data-editable]:hover{outline:2px solid #2563eb;outline-offset:4px;border-radius:4px}
    [data-editable]:hover::after{content:attr(data-edit-label);position:absolute;top:-24px;left:0;background:#2563eb;color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;font-family:Inter,sans-serif;z-index:9999;white-space:nowrap}
  `;
  doc.head.appendChild(style);

  // Find sections by various selectors
  const sections=doc.querySelectorAll('section, [id]');
  sections.forEach(el=>{
    const id=el.id||el.className;
    SECTIONS.forEach(s=>{
      if(id&&(id.includes(s.anchor||s.id)||el.className.includes(s.anchor||s.id))){
        el.setAttribute('data-editable',s.id);
        el.setAttribute('data-edit-label','✏️ '+s.label);
        el.addEventListener('click',(e)=>{
          e.preventDefault();
          e.stopPropagation();
          openSection(s.id);
        });
      }
    });
  });
}

/* ── Section list ── */
function renderSectionList(){
  const el=document.getElementById('sectionList');
  el.innerHTML=SECTIONS.map(s=>`
    <div class="section-item" onclick="openSection('${s.id}')">
      <span class="dot" style="background:${s.color}"></span>
      <div class="info"><h4>${s.label}</h4><span>${getSummary(s.id)}</span></div>
      <span class="arrow">›</span>
    </div>`).join('');
}

function getSummary(id){
  if(id==='hero')return esc(data.hero.title||'');
  if(id==='faq')return data.faq.items.length+' frågor';
  if(id==='about')return esc(data.about.title||'');
  if(id==='just-nu')return data['just-nu'].cards.length+' nyheter';
  if(id==='services')return esc(data.services.title||'');
  return '';
}

/* ── Sidebar editing ── */
function openSection(id){
  activeSection=id;
  const s=SECTIONS.find(x=>x.id===id);
  document.getElementById('sidebarTitle').innerHTML=`<span class="dot" style="background:${s.color}"></span>${s.label}`;
  document.getElementById('sidebarBody').innerHTML=renderEditor(id);
  document.getElementById('sidebar').classList.remove('closed');

  // Scroll iframe to section
  try{
    const frame=document.getElementById('previewFrame');
    const el=frame.contentDocument.querySelector(`[data-editable="${id}"]`)||frame.contentDocument.getElementById(s.anchor||id);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  }catch(e){}
}

function closeSidebar(){
  activeSection=null;
  document.getElementById('sidebarTitle').textContent='Välj sektion';
  document.getElementById('sidebarBody').innerHTML='<div class="section-list" id="sectionList"></div>';
  renderSectionList();
}

function renderEditor(id){
  let h='';
  if(id==='hero'){
    const d=data.hero;
    h+=sf('Badge',d.badge,'hero','badge');
    h+=sf('Rubrik',d.title,'hero','title');
    h+=st('Undertext',d.subtitle,'hero','subtitle');
    h+=`<div class="s-row">${sf('Knapp 1',d.cta1_text,'hero','cta1_text')}${sf('Länk 1',d.cta1_url,'hero','cta1_url')}</div>`;
    h+=`<div class="s-row">${sf('Knapp 2',d.cta2_text,'hero','cta2_text')}${sf('Länk 2',d.cta2_url,'hero','cta2_url')}</div>`;
    h+=sf('Bild-URL',d.image_url,'hero','image_url');
    h+=listEditor('Trust-signaler',d.trust_items,'hero','trust_items',['bold:Fetstil','text:Text']);
  } else if(id==='faq'){
    h+=listEditor('Frågor & svar',data.faq.items,'faq','items',['question:Fråga','answer:Svar|ta']);
  } else if(id==='about'){
    const d=data.about;
    h+=sf('Rubrik',d.title,'about','title');
    h+=st('Intro',d.intro,'about','intro');
    h+=listEditor('Tidslinje',d.timeline,'about','timeline',['year:År','title:Rubrik','text:Text|ta']);
    h+=listEditor('Värderingar',d.values,'about','values',['title:Rubrik','text:Text|ta']);
  } else if(id==='just-nu'){
    h+=listEditor('Nyhetskort',data['just-nu'].cards,'just-nu','cards',['label:Etikett','title:Rubrik','text:Text|ta','link:Länk','link_text:Länktext']);
  } else if(id==='services'){
    const d=data.services;
    h+=sf('Rubrik',d.title,'services','title');
    h+=st('Text 1',d.text1,'services','text1');
    h+=st('Text 2',d.text2,'services','text2');
    h+=listEditor('Punkter',d.points,'services','points',['title:Rubrik','text:Text|ta']);
  }
  h+=`<div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
    <button class="save-btn" onclick="saveCurrent()" style="background:var(--blue);color:#fff;border:none;padding:10px 24px;font-size:.85rem;font-weight:600;border-radius:var(--radius);cursor:pointer;font-family:inherit">Spara ${SECTIONS.find(x=>x.id===id).label}</button>
  </div>`;
  return h;
}

/* Field helpers */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function sf(label,val,file,key){
  return `<div class="s-field"><label>${label}</label><input type="text" value="${esc(val||'')}" oninput="upd('${file}','${key}',this.value)"></div>`;
}
function st(label,val,file,key){
  return `<div class="s-field"><label>${label}</label><textarea oninput="upd('${file}','${key}',this.value)">${esc(val||'')}</textarea></div>`;
}

function listEditor(label,items,file,arrKey,fields){
  let h=`<div style="margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <label style="font-size:.7rem;font-weight:600;color:var(--text-sec);text-transform:uppercase;letter-spacing:.04em">${label}</label>
  </div>`;
  items.forEach((item,i)=>{
    h+=`<div class="s-list-item"><button class="s-remove" onclick="removeI('${file}','${arrKey}',${i})">×</button>`;
    fields.forEach(fd=>{
      const[k,rest]=fd.split(':');
      const[lbl,type]=rest.split('|');
      const v=item[k]||'';
      if(type==='ta'){
        h+=`<div class="s-field"><label>${lbl}</label><textarea oninput="updL('${file}','${arrKey}',${i},'${k}',this.value)">${esc(v)}</textarea></div>`;
      }else{
        h+=`<div class="s-field"><label>${lbl}</label><input type="text" value="${esc(v)}" oninput="updL('${file}','${arrKey}',${i},'${k}',this.value)"></div>`;
      }
    });
    h+='</div>';
  });
  const max=arrKey==='cards'?3:99;
  if(items.length<max) h+=`<button class="s-add" onclick="addI('${file}','${arrKey}')">+ Lägg till</button>`;
  h+='</div>';
  return h;
}

/* ── Data operations ── */
function upd(file,key,val){
  data[file][key]=val;
  markDirty(file);
}
function updL(file,arrKey,idx,key,val){
  data[file][arrKey][idx][key]=val;
  markDirty(file);
}
function removeI(file,arrKey,idx){
  data[file][arrKey].splice(idx,1);
  markDirty(file);
  openSection(activeSection);
}
function addI(file,arrKey){
  const arr=data[file][arrKey];
  const tpl=arr.length>0?Object.fromEntries(Object.keys(arr[0]).map(k=>[k,''])):
    {hero:{bold:'',text:''},faq:{question:'',answer:''},about:{title:'',text:''},'just-nu':{label:'',title:'',text:'',link:'',link_text:''},services:{title:'',text:''}}[file]||{};
  arr.push(tpl);
  markDirty(file);
  openSection(activeSection);
}

function markDirty(file){
  dirty.add(file);
  document.getElementById('globalSave').disabled=false;
}

/* ── Save ── */
async function saveCurrent(){
  if(!activeSection)return;
  const btn=document.querySelector('.sidebar .save-btn:last-child');
  btn.textContent='Sparar...';btn.disabled=true;
  try{
    await saveFile(activeSection);
    dirty.delete(activeSection);
    if(dirty.size===0)document.getElementById('globalSave').disabled=true;
    toast('Sparat!','success');
    btn.textContent='Sparat ✓';
    // Reload preview
    document.getElementById('previewFrame').contentWindow.location.reload();
    setTimeout(()=>{btn.textContent='Spara '+SECTIONS.find(x=>x.id===activeSection).label;btn.disabled=false},2000);
  }catch(e){
    toast('Fel: '+e.message,'error');
    btn.textContent='Försök igen';btn.disabled=false;
  }
}

async function saveAll(){
  const btn=document.getElementById('globalSave');
  btn.textContent='Sparar...';btn.disabled=true;
  try{
    for(const f of dirty) await saveFile(f);
    dirty.clear();
    toast('Allt sparat!','success');
    document.getElementById('previewFrame').contentWindow.location.reload();
  }catch(e){toast('Fel: '+e.message,'error')}
  btn.textContent='Spara';btn.disabled=dirty.size===0;
}

/* ── Helpers ── */
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── Init ── */
if(window.netlifyIdentity) netlifyIdentity.on('init',()=>initAuth());
</script>
</body>
</html>
