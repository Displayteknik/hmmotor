<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Motor — Redigera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f8f9fb;--white:#fff;--border:#e5e7eb;--border-focus:#3b82f6;
      --text:#111827;--text-secondary:#6b7280;--text-tertiary:#9ca3af;
      --blue:#2563eb;--blue-hover:#1d4ed8;--blue-light:#eff6ff;--blue-ring:rgba(37,99,235,.15);
      --green:#059669;--green-bg:#ecfdf5;--red:#dc2626;--red-bg:#fef2f2;
      --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 4px 12px rgba(0,0,0,.1);
    }
    body{margin:0;background:var(--bg);font-family:'Inter',-apple-system,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}

    /* ── Login ── */
    #login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fff}
    #login h1{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
    #login p{color:var(--text-secondary);font-size:.9rem;margin-bottom:2rem}
    #login button{background:var(--blue);color:#fff;border:none;padding:12px 32px;font-size:.9rem;font-weight:600;border-radius:var(--radius);cursor:pointer;font-family:inherit;transition:background .15s}
    #login button:hover{background:var(--blue-hover)}

    /* ── Top bar ── */
    .topbar{background:#fff;border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
    .topbar .left{display:flex;align-items:center;gap:16px}
    .topbar .brand{font-weight:700;font-size:.95rem;color:var(--text);text-decoration:none}
    .topbar .sep{color:var(--border);font-weight:300}
    .topbar .page-title{color:var(--text-secondary);font-size:.85rem;font-weight:500}
    .topbar .right{display:flex;align-items:center;gap:12px}
    .topbar a{color:var(--text-secondary);text-decoration:none;font-size:.8rem;font-weight:500;padding:6px 10px;border-radius:6px;transition:all .15s}
    .topbar a:hover{color:var(--text);background:var(--bg)}
    .topbar .logout{color:var(--text-tertiary);cursor:pointer;background:none;border:none;font-size:.8rem;font-family:inherit;padding:6px 10px;border-radius:6px}
    .topbar .logout:hover{color:var(--red);background:var(--red-bg)}

    /* ── Main ── */
    .main{max-width:720px;margin:0 auto;padding:40px 24px 80px}

    /* ── Section block ── */
    .block{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
    .block-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none;transition:background .1s}
    .block-head:hover{background:#fafbfc}
    .block-head h2{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:10px}
    .block-head h2 .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .block-head .preview{color:var(--text-tertiary);font-size:.8rem;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .block-head .arrow{color:var(--text-tertiary);font-size:.7rem;transition:transform .2s}
    .block.open .block-head .arrow{transform:rotate(180deg)}
    .block.open .block-head{border-bottom:1px solid var(--border)}
    .block-body{display:none;padding:20px}
    .block.open .block-body{display:block}

    /* ── Fields ── */
    .field{margin-bottom:16px}
    .field:last-child{margin-bottom:0}
    .field label{display:block;font-size:.75rem;font-weight:600;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
    .field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:.9rem;font-family:inherit;color:var(--text);background:#fff;transition:border-color .15s,box-shadow .15s;resize:vertical}
    .field input:focus,.field textarea:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px var(--blue-ring)}
    .field input::placeholder,.field textarea::placeholder{color:var(--text-tertiary)}
    .field textarea{min-height:72px;line-height:1.6}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:600px){.field-row{grid-template-columns:1fr}}

    /* ── List items ── */
    .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .list-header span{font-size:.75rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em}
    .list-item{border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;position:relative;background:#fff;transition:border-color .15s}
    .list-item:hover{border-color:#d1d5db}
    .list-item .remove-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text-tertiary);font-size:1.1rem;cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .list-item .remove-btn:hover{color:var(--red);background:var(--red-bg)}
    .list-item .field{margin-bottom:10px}
    .list-item .field:last-child{margin-bottom:0}

    /* ── Buttons ── */
    .add-btn{display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-size:.8rem;font-weight:600;background:none;border:1.5px dashed var(--border);border-radius:var(--radius);padding:8px 14px;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;justify-content:center}
    .add-btn:hover{background:var(--blue-light);border-color:var(--blue)}
    .save-bar{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding-top:16px;border-top:1px solid var(--border);margin-top:16px}
    .save-btn{background:var(--blue);color:#fff;border:none;padding:10px 24px;font-size:.85rem;font-weight:600;border-radius:var(--radius);cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
    .save-btn:hover{background:var(--blue-hover);box-shadow:var(--shadow-lg)}
    .save-btn:disabled{opacity:.5;cursor:not-allowed}
    .save-btn.saving{background:var(--text-secondary)}
    .save-status{font-size:.8rem;color:var(--text-tertiary)}

    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:var(--radius);font-size:.85rem;font-weight:500;color:#fff;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s ease;box-shadow:var(--shadow-lg)}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}

    /* ── Loading ── */
    .loading{text-align:center;padding:60px 20px;color:var(--text-tertiary);font-size:.9rem}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<!-- Login -->
<div id="login">
  <h1>HM Motor</h1>
  <p>Logga in för att redigera sajten</p>
  <button onclick="netlifyIdentity.open('login')">Logga in</button>
</div>

<!-- App -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="left">
      <a href="/" class="brand">HM Motor</a>
      <span class="sep">/</span>
      <span class="page-title">Redigera sajten</span>
    </div>
    <div class="right">
      <a href="/dashboard">Fordon &amp; blogg</a>
      <a href="/" target="_blank">Visa sajten ↗</a>
      <button class="logout" id="logoutBtn">Logga ut</button>
    </div>
  </div>
  <div class="main" id="content">
    <div class="loading"><div class="spinner"></div>Laddar innehåll...</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const FILES = ['hero','faq','about','just-nu','services'];
const LABELS = {hero:'Startsidan',faq:'Vanliga frågor',about:'Om oss','just-nu':'Just nu','services':'Varför HM Motor'};
const DOTS = {hero:'#2563eb',faq:'#8b5cf6',about:'#059669','just-nu':'#f59e0b',services:'#ec4899'};
let data = {}, shas = {}, token = '';

/* ── Auth ── */
function initAuth() {
  const user = netlifyIdentity.currentUser();
  if (user) { startApp(user); return; }
  document.getElementById('login').style.display = 'flex';
  netlifyIdentity.on('login', u => startApp(u));
}

async function startApp(user) {
  const t = await user.jwt();
  token = t;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('logoutBtn').onclick = () => { netlifyIdentity.logout(); location.reload(); };
  loadAll();
}

/* ── API ── */
async function loadFile(name) {
  const r = await fetch(`/.netlify/git/github/contents/content/pages/${name}.json`, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!r.ok) throw new Error('Kunde inte ladda ' + name);
  const j = await r.json();
  shas[name] = j.sha;
  data[name] = JSON.parse(atob(j.content));
}

async function saveFile(name) {
  const body = JSON.stringify(data[name], null, 2) + '\n';
  const r = await fetch(`/.netlify/git/github/contents/content/pages/${name}.json`, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `Uppdatera ${LABELS[name]}`, content: btoa(unescape(encodeURIComponent(body))), sha: shas[name] })
  });
  if (!r.ok) throw new Error('Kunde inte spara');
  const j = await r.json();
  shas[name] = j.content.sha;
}

/* ── Render ── */
async function loadAll() {
  try {
    await Promise.all(FILES.map(f => loadFile(f)));
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:var(--red)">Fel: ${e.message}</div>`;
  }
}

function render() {
  const c = document.getElementById('content');
  c.innerHTML = FILES.map(f => {
    const preview = getPreview(f);
    return `<div class="block" id="block-${f}">
      <div class="block-head" onclick="toggle('${f}')">
        <h2><span class="dot" style="background:${DOTS[f]}"></span>${LABELS[f]}</h2>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="preview">${preview}</span>
          <span class="arrow">▼</span>
        </div>
      </div>
      <div class="block-body">${renderFields(f)}</div>
    </div>`;
  }).join('');
}

function getPreview(f) {
  if (f === 'hero') return esc(data.hero.title);
  if (f === 'faq') return data.faq.items.length + ' frågor';
  if (f === 'about') return esc(data.about.title);
  if (f === 'just-nu') return data['just-nu'].cards.length + ' nyheter';
  if (f === 'services') return esc(data.services.title);
  return '';
}

function renderFields(f) {
  if (f === 'hero') return renderHero();
  if (f === 'faq') return renderFAQ();
  if (f === 'about') return renderAbout();
  if (f === 'just-nu') return renderJustNu();
  if (f === 'services') return renderServices();
}

function renderHero() {
  const d = data.hero;
  return `
    ${field('Badge', d.badge, 'hero.badge')}
    ${field('Rubrik', d.title, 'hero.title')}
    ${textarea('Undertext', d.subtitle, 'hero.subtitle')}
    <div class="field-row">
      ${field('Knapp 1 — text', d.cta1_text, 'hero.cta1_text')}
      ${field('Knapp 1 — länk', d.cta1_url, 'hero.cta1_url')}
    </div>
    <div class="field-row">
      ${field('Knapp 2 — text', d.cta2_text, 'hero.cta2_text')}
      ${field('Knapp 2 — länk', d.cta2_url, 'hero.cta2_url')}
    </div>
    ${field('Bakgrundsbild (URL)', d.image_url, 'hero.image_url')}
    ${listSection('Trust-signaler', d.trust_items, 'hero.trust_items', ['bold:Fetstil', 'text:Text'])}
    ${saveBar('hero')}`;
}

function renderFAQ() {
  const d = data.faq;
  return `
    ${listSection('Frågor & svar', d.items, 'faq.items', ['question:Fråga', 'answer:Svar|textarea'])}
    ${saveBar('faq')}`;
}

function renderAbout() {
  const d = data.about;
  return `
    ${field('Rubrik', d.title, 'about.title')}
    ${textarea('Introduktion', d.intro, 'about.intro')}
    ${listSection('Tidslinje', d.timeline, 'about.timeline', ['year:År', 'title:Rubrik', 'text:Beskrivning|textarea'])}
    ${listSection('Värderingar', d.values, 'about.values', ['title:Rubrik', 'text:Beskrivning|textarea'])}
    ${saveBar('about')}`;
}

function renderJustNu() {
  const d = data['just-nu'];
  return `
    ${listSection('Nyhetskort (max 3)', d.cards, 'just-nu.cards', ['label:Etikett', 'title:Rubrik', 'text:Beskrivning|textarea', 'link:Länk', 'link_text:Länktext'])}
    ${saveBar('just-nu')}`;
}

function renderServices() {
  const d = data.services;
  return `
    ${field('Rubrik', d.title, 'services.title')}
    ${textarea('Text stycke 1', d.text1, 'services.text1')}
    ${textarea('Text stycke 2', d.text2, 'services.text2')}
    ${listSection('Punkter', d.points, 'services.points', ['title:Rubrik', 'text:Text|textarea'])}
    ${saveBar('services')}`;
}

/* ── Field helpers ── */
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function field(label, value, path) {
  return `<div class="field"><label>${label}</label><input type="text" value="${esc(value||'')}" onchange="setVal('${path}',this.value)" oninput="setVal('${path}',this.value)"></div>`;
}

function textarea(label, value, path) {
  return `<div class="field"><label>${label}</label><textarea onchange="setVal('${path}',this.value)" oninput="setVal('${path}',this.value)">${esc(value||'')}</textarea></div>`;
}

function listSection(label, items, path, fieldDefs) {
  const maxNote = path === 'just-nu.cards' ? 3 : 999;
  let html = `<div style="margin-top:16px">
    <div class="list-header"><span>${label}</span></div>`;
  items.forEach((item, i) => {
    html += `<div class="list-item">
      <button class="remove-btn" onclick="removeItem('${path}',${i})" title="Ta bort">×</button>`;
    fieldDefs.forEach(fd => {
      const [key, rest] = fd.split(':');
      const [lbl, type] = rest.split('|');
      const val = item[key] || '';
      const p = `${path}.${i}.${key}`;
      if (type === 'textarea') {
        html += `<div class="field"><label>${lbl}</label><textarea onchange="setListVal('${path}',${i},'${key}',this.value)" oninput="setListVal('${path}',${i},'${key}',this.value)">${esc(val)}</textarea></div>`;
      } else {
        html += `<div class="field"><label>${lbl}</label><input type="text" value="${esc(val)}" onchange="setListVal('${path}',${i},'${key}',this.value)" oninput="setListVal('${path}',${i},'${key}',this.value)"></div>`;
      }
    });
    html += '</div>';
  });
  if (items.length < maxNote) {
    html += `<button class="add-btn" onclick="addItem('${path}')">+ Lägg till</button>`;
  }
  html += '</div>';
  return html;
}

function saveBar(file) {
  return `<div class="save-bar">
    <span class="save-status" id="status-${file}"></span>
    <button class="save-btn" id="savebtn-${file}" onclick="save('${file}')">Spara ändringar</button>
  </div>`;
}

/* ── Data ops ── */
function setVal(path, val) {
  const parts = path.split('.');
  const file = parts[0] === 'just-nu' ? 'just-nu' : parts[0];
  const key = parts[0] === 'just-nu' ? parts.slice(1).join('.') : parts.slice(1).join('.');
  let obj = data[file];
  const keys = key.split('.');
  for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
  obj[keys[keys.length - 1]] = val;
}

function setListVal(path, idx, key, val) {
  const file = path.includes('just-nu') ? 'just-nu' : path.split('.')[0];
  const arrKey = path.split('.').slice(file === 'just-nu' ? 1 : 1).join('.');
  let arr = data[file];
  arrKey.split('.').forEach(k => arr = arr[k]);
  arr[idx][key] = val;
}

function getArr(path) {
  const file = path.includes('just-nu') ? 'just-nu' : path.split('.')[0];
  const arrKey = path.split('.').slice(file === 'just-nu' ? 1 : 1).join('.');
  let arr = data[file];
  arrKey.split('.').forEach(k => arr = arr[k]);
  return { file, arr };
}

function removeItem(path, idx) {
  const { file, arr } = getArr(path);
  arr.splice(idx, 1);
  render();
  const block = document.getElementById('block-' + file);
  if (block) block.classList.add('open');
}

function addItem(path) {
  const { file, arr } = getArr(path);
  // Create empty item with same keys as first item or defaults
  if (arr.length > 0) {
    const template = {};
    Object.keys(arr[0]).forEach(k => template[k] = '');
    arr.push(template);
  } else {
    // Defaults per section
    const defaults = {
      'hero.trust_items': { bold: '', text: '' },
      'faq.items': { question: '', answer: '' },
      'about.timeline': { year: '', title: '', text: '' },
      'about.values': { title: '', text: '' },
      'just-nu.cards': { label: '', title: '', text: '', link: '', link_text: '' },
      'services.points': { title: '', text: '' }
    };
    arr.push(defaults[path] || {});
  }
  render();
  const block = document.getElementById('block-' + file);
  if (block) block.classList.add('open');
}

/* ── Save ── */
async function save(file) {
  const btn = document.getElementById('savebtn-' + file);
  const status = document.getElementById('status-' + file);
  btn.disabled = true;
  btn.classList.add('saving');
  btn.textContent = 'Sparar...';
  status.textContent = '';
  try {
    await saveFile(file);
    toast('Sparat!', 'success');
    status.textContent = 'Sparat just nu';
    status.style.color = 'var(--green)';
    // Update preview
    const block = document.getElementById('block-' + file);
    const prev = block.querySelector('.preview');
    if (prev) prev.textContent = getPreview(file);
  } catch (e) {
    toast('Kunde inte spara: ' + e.message, 'error');
    status.textContent = 'Misslyckades';
    status.style.color = 'var(--red)';
  } finally {
    btn.disabled = false;
    btn.classList.remove('saving');
    btn.textContent = 'Spara ändringar';
  }
}

/* ── UI helpers ── */
function toggle(f) {
  document.getElementById('block-' + f).classList.toggle('open');
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── Init ── */
if (window.netlifyIdentity) {
  netlifyIdentity.on('init', () => initAuth());
}
</script>
</body>
</html>
