<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Motor — Visuell redigering</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- GrapesJS -->
  <link href="https://unpkg.com/grapesjs@0.21.13/dist/css/grapes.min.css" rel="stylesheet">
  <script src="https://unpkg.com/grapesjs@0.21.13/dist/grapes.min.js"></script>
  <script src="https://unpkg.com/grapesjs-preset-webpage@1.0.3/dist/index.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#18191b;color:#ddd;height:100vh;overflow:hidden}

    /* Login */
    #login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#111}
    #login h1{font-size:1.4rem;font-weight:700;margin-bottom:.25rem;color:#fff}
    #login p{color:#888;font-size:.85rem;margin-bottom:2rem}
    #login button{background:#2563eb;color:#fff;border:none;padding:12px 32px;font-size:.9rem;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit}
    #login button:hover{background:#1d4ed8}

    /* Editor wrapper */
    #editor-wrap{display:none;height:100vh;flex-direction:column}

    /* Top bar */
    .topbar{height:46px;background:#1e1f22;border-bottom:1px solid #2a2b2e;display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;z-index:10}
    .topbar .left{display:flex;align-items:center;gap:10px}
    .topbar .brand{font-weight:700;font-size:.85rem;color:#fff}
    .topbar .sep{color:#444}
    .topbar .mode{color:#888;font-size:.8rem}
    .topbar .right{display:flex;align-items:center;gap:6px}
    .topbar button,.topbar a{font-size:.78rem;font-weight:500;font-family:inherit;padding:6px 12px;border-radius:6px;cursor:pointer;border:1px solid #333;background:#2a2b2e;color:#ccc;text-decoration:none;transition:all .15s}
    .topbar button:hover,.topbar a:hover{background:#333;color:#fff}
    .topbar .save-btn{background:#2563eb;color:#fff;border-color:#2563eb}
    .topbar .save-btn:hover{background:#1d4ed8}

    /* GrapesJS overrides */
    #gjs{flex:1;overflow:hidden}

    /* Make GrapesJS dark */
    .gjs-one-bg{background:#1e1f22 !important}
    .gjs-two-color{color:#ddd !important}
    .gjs-three-bg{background:#2a2b2e !important}
    .gjs-four-color,.gjs-four-color-h:hover{color:#2563eb !important}
    .gjs-pn-panel{border:none !important}
    .gjs-pn-views,.gjs-pn-views-container{background:#1e1f22 !important}
    .gjs-pn-options{background:#1e1f22 !important}
    .gjs-cv-canvas{background:#e5e7eb !important}
    .gjs-block{background:#2a2b2e !important;border:1px solid #333 !important;border-radius:6px !important;color:#ccc !important;padding:8px !important;min-height:auto !important}
    .gjs-block:hover{border-color:#2563eb !important;color:#fff !important}
    .gjs-block__media{display:none !important}
    .gjs-blocks-cs{padding:8px !important}
    .gjs-pn-btn{border-radius:4px !important}
    .gjs-pn-btn.gjs-pn-active{background:#2563eb !important;color:#fff !important}
    .gjs-sm-sector-title,.gjs-clm-tags .gjs-sm-title{background:#252628 !important;color:#aaa !important;font-size:.7rem !important;text-transform:uppercase !important;letter-spacing:.05em !important}
    .gjs-field{background:#1a1b1e !important;border:1px solid #333 !important;border-radius:4px !important;color:#ddd !important}
    .gjs-field:focus-within{border-color:#2563eb !important}
    .gjs-trt-trait{padding:8px 12px !important}
    .gjs-trt-trait .gjs-label{font-size:.75rem !important;font-weight:600 !important;color:#aaa !important;text-transform:uppercase !important;letter-spacing:.04em !important;margin-bottom:4px !important}
    .gjs-sm-properties{padding:8px !important}

    /* Traits panel: bigger, cleaner */
    .gjs-trt-traits{padding:8px !important}
    .gjs-trt-trait .gjs-field{min-height:36px !important}
    .gjs-trt-trait textarea.gjs-field{min-height:100px !important;resize:vertical !important;line-height:1.5 !important;padding:10px !important;font-size:.85rem !important}
    .gjs-trt-trait input.gjs-field{padding:8px 10px !important;font-size:.85rem !important}

    /* Right panel wider */
    .gjs-pn-views-container{width:320px !important;min-width:320px !important}
    .gjs-pn-views{width:320px !important}

    /* Component settings header */
    .gjs-traits-label{background:#252628 !important;padding:10px 14px !important;font-size:.8rem !important;font-weight:700 !important;color:#ccc !important;letter-spacing:.02em !important;border-bottom:1px solid #333 !important}

    /* Make trait containers cleaner */
    .gjs-trt-trait{border-bottom:1px solid #2a2b2e !important;margin:0 !important;padding:10px 14px !important}
    .gjs-trt-trait:last-child{border-bottom:none !important}

    /* Style manager sectors */
    .gjs-sm-sector{border-bottom:1px solid #2a2b2e !important}
    .gjs-sm-sector-title{padding:10px 14px !important;font-size:.75rem !important}

    /* Hide less useful panels for simplicity */
    .gjs-clm-tags{padding:8px 14px !important}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);opacity:0;padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:500;color:#fff;z-index:9999;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast.success{background:#059669}.toast.error{background:#dc2626}
  </style>
</head>
<body>

<div id="login">
  <h1>HM Motor</h1>
  <p>Visuell redigering</p>
  <button onclick="netlifyIdentity.open('login')">Logga in</button>
</div>

<div id="editor-wrap">
  <div class="topbar">
    <div class="left">
      <span class="brand">HM Motor</span>
      <span class="sep">/</span>
      <span class="mode">Visuell redigering</span>
    </div>
    <div class="right">
      <a href="/dashboard">Fordon</a>
      <a href="/" target="_blank">Visa sajten ↗</a>
      <button onclick="undoAction()">↶ Ångra</button>
      <button onclick="redoAction()">↷ Gör om</button>
      <button class="save-btn" id="saveBtn" onclick="saveChanges()">Spara</button>
      <button onclick="netlifyIdentity.logout();location.reload()" style="border-color:#555">Logga ut</button>
    </div>
  </div>
  <div id="gjs"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let editor, token, pageSha;

/* ── Auth ── */
function initAuth() {
  const u = netlifyIdentity.currentUser();
  if (u) startApp(u);
  else {
    document.getElementById('login').style.display = 'flex';
    netlifyIdentity.on('login', u => startApp(u));
  }
}

async function startApp(user) {
  token = await user.jwt();
  document.getElementById('login').style.display = 'none';
  document.getElementById('editor-wrap').style.display = 'flex';
  await loadPageAndInit();
}

/* ── Load page HTML from GitHub ── */
async function loadPageAndInit() {
  try {
    const r = await fetch('/.netlify/git/github/contents/index.html', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const j = await r.json();
    pageSha = j.sha;
    const html = decodeURIComponent(escape(atob(j.content)));
    initEditor(html);
  } catch (e) {
    // Fallback: fetch the live page
    const r = await fetch('/');
    const html = await r.text();
    initEditor(html);
  }
}

/* ── GrapesJS Init ── */
function initEditor(html) {
  // Extract body content and styles
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Get external CSS links
  const cssLinks = [];
  doc.querySelectorAll('link[rel="stylesheet"]').forEach(l => {
    let href = l.getAttribute('href');
    if (href && !href.startsWith('http')) href = window.location.origin + '/' + href.replace(/^\//, '');
    if (href) cssLinks.push(href);
  });

  // Get body HTML (exclude scripts)
  const bodyClone = doc.body.cloneNode(true);
  bodyClone.querySelectorAll('script').forEach(s => s.remove());
  const bodyHTML = bodyClone.innerHTML;

  // Get inline styles
  let inlineCSS = '';
  doc.querySelectorAll('style').forEach(s => inlineCSS += s.textContent);

  editor = grapesjs.init({
    container: '#gjs',
    height: '100%',
    width: 'auto',
    fromElement: false,
    components: bodyHTML,
    style: inlineCSS,
    storageManager: false,
    canvas: {
      styles: cssLinks.concat([
        'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap'
      ]),
      scripts: [
        'https://unpkg.com/lucide@latest'
      ]
    },
    plugins: ['gjs-preset-webpage'],
    pluginsOpts: {
      'gjs-preset-webpage': {
        blocksBasicOpts: { flexGrid: true },
        navbarOpts: false,
        countdownOpts: false,
        formsOpts: false,
      }
    },
    deviceManager: {
      devices: [
        { name: 'Desktop', width: '' },
        { name: 'Tablet', width: '768px', widthMedia: '992px' },
        { name: 'Mobil', width: '375px', widthMedia: '480px' },
      ]
    },
  });

  // Add custom blocks for HM Motor components
  const bm = editor.BlockManager;

  bm.add('hm-section', {
    label: 'Sektion',
    category: 'HM Motor',
    content: '<section class="section section--white"><div class="container"><div class="section-header"><h2>Ny sektion</h2></div><p>Innehåll här...</p></div></section>',
  });

  bm.add('hm-cta', {
    label: 'CTA-knapp',
    category: 'HM Motor',
    content: '<a href="#" class="btn btn-blue btn-lg">Klicka här</a>',
  });

  bm.add('hm-card', {
    label: 'Nyhetskort',
    category: 'HM Motor',
    content: `<div class="just-nu-card"><span class="just-nu-label">Nyheter</span><h3>Rubrik</h3><p>Beskrivning</p><a href="#">Läs mer →</a></div>`,
  });

  bm.add('hm-faq', {
    label: 'FAQ-fråga',
    category: 'HM Motor',
    content: '<details class="faq-item"><summary>Ny fråga<span class="faq-toggle">+</span></summary><p>Svar här...</p></details>',
  });

  bm.add('hm-trust', {
    label: 'Trust-signal',
    category: 'HM Motor',
    content: '<div class="hero-trust-item"><strong>99+</strong> nöjda kunder</div>',
  });

  // After canvas loads, init Lucide icons
  editor.on('canvas:frame:load', ({ window: w }) => {
    setTimeout(() => {
      if (w.lucide) w.lucide.createIcons();
    }, 500);
  });

  // Text tags that should show content editor
  const TEXT_TAGS = ['H1','H2','H3','H4','H5','H6','P','SPAN','A','SUMMARY','STRONG','LABEL','LI','TD','TH','BUTTON','FIGCAPTION'];

  // When selecting a component, show its text content as a trait
  editor.on('component:selected', (model) => {
    const el = model.getEl();
    if (!el) return;
    const tag = el.tagName;

    // Enable inline editing for text
    if (TEXT_TAGS.includes(tag)) {
      model.set('editable', true);
    }

    // Add content trait for text elements
    const traits = [];
    if (TEXT_TAGS.includes(tag)) {
      traits.push({
        type: 'textarea',
        label: 'Textinnehåll',
        name: 'content-text',
        changeProp: true,
        placeholder: 'Skriv text...',
      });
    }

    // Add href trait for links
    if (tag === 'A') {
      traits.push({ type: 'text', label: 'Länk (URL)', name: 'href', placeholder: 'https://...' });
      traits.push({ type: 'select', label: 'Öppna i', name: 'target', options: [{value:'', name:'Samma flik'},{value:'_blank', name:'Ny flik'}] });
    }

    // Add src/alt for images
    if (tag === 'IMG') {
      traits.push({ type: 'text', label: 'Bild-URL', name: 'src', placeholder: 'https://...' });
      traits.push({ type: 'text', label: 'Alt-text', name: 'alt', placeholder: 'Beskrivning...' });
    }

    if (traits.length) {
      model.set('traits', traits);

      // Set initial value for content-text trait
      if (TEXT_TAGS.includes(tag)) {
        // Get direct text (not children's text)
        const directText = Array.from(el.childNodes)
          .filter(n => n.nodeType === 3)
          .map(n => n.textContent.trim())
          .join(' ') || el.textContent.trim();
        model.set('content-text', directText);
      }

      // Open traits panel (settings icon)
      editor.Panels.getButton('views', 'open-tm')?.set('active', true);
    }
  });

  // When content-text trait changes, update the component
  editor.on('component:update:content-text', (model) => {
    const newText = model.get('content-text');
    if (newText !== undefined) {
      const el = model.getEl();
      if (el) {
        // If element has child elements, only replace text nodes
        const hasChildren = el.querySelector('*');
        if (hasChildren) {
          const textNode = Array.from(el.childNodes).find(n => n.nodeType === 3);
          if (textNode) textNode.textContent = newText;
        } else {
          model.components(newText);
        }
      }
    }
  });
}

/* ── Actions ── */
function undoAction() { if (editor) editor.UndoManager.undo(); }
function redoAction() { if (editor) editor.UndoManager.redo(); }

async function saveChanges() {
  if (!editor) return;
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Sparar...';
  btn.disabled = true;

  try {
    // Get the full HTML
    const html = editor.getHtml();
    const css = editor.getCss();

    // Reconstruct full page
    const fullHTML = buildFullPage(html, css);

    // Save via Git Gateway
    const encoded = btoa(unescape(encodeURIComponent(fullHTML)));

    // Get fresh SHA
    const shaResp = await fetch('/.netlify/git/github/contents/index.html', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const shaData = await shaResp.json();
    pageSha = shaData.sha;

    const r = await fetch('/.netlify/git/github/contents/index.html', {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Visuell redigering via admin',
        content: encoded,
        sha: pageSha
      })
    });

    if (!r.ok) throw new Error('Kunde inte spara');
    const result = await r.json();
    pageSha = result.content.sha;
    toast('Sparat! Sajten uppdateras om ~30 sek.', 'success');
  } catch (e) {
    toast('Fel: ' + e.message, 'error');
  }

  btn.textContent = 'Spara';
  btn.disabled = false;
}

function buildFullPage(bodyHTML, editorCSS) {
  // We need to wrap the edited body back in the full HTML structure
  // Start with original head, add edited body
  return `<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HM Motor Krokom | Begagnade Bilar, Fyrhjulingar & ATV i Jämtland</title>
<meta name="description" content="HM Motor i Krokom — Jämtlands mest pålitliga fordonshandlare sedan 1990. Begagnade bilar, CF Moto fyrhjulingar, mopeder, släpvagnar. Finansiering via Wasa Kredit.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://hmmotor.se/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=5">
<script src="https://unpkg.com/lucide@latest" defer><\/script>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer><\/script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>
</head>
<body>
${bodyHTML}
<script src="assets/js/supabase.js"><\/script>
<script src="assets/js/content.js"><\/script>
<script src="assets/js/main.js"><\/script>
<script>
if (window.netlifyIdentity) {
  window.netlifyIdentity.on("init", user => {
    if (!user) window.netlifyIdentity.on("login", () => document.location.href = "/admin/");
  });
}
<\/script>
</body>
</html>`;
}

/* ── Toast ── */
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 4000);
}

/* ── Init ── */
if (window.netlifyIdentity) netlifyIdentity.on('init', () => initAuth());
</script>
</body>
</html>
